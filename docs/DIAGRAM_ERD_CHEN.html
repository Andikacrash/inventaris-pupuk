<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERD Chen — Sistem Inventaris & POS Pupuk</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            color: #222;
        }
        header {
            background: #1a5c42;
            color: #fff;
            padding: 1rem 1.5rem;
            text-align: center;
        }
        header h1 { font-size: 1.25rem; font-weight: 700; }
        header p { font-size: 0.9rem; opacity: 0.9; margin-top: 0.25rem; }
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem 2rem;
            justify-content: center;
            padding: 0.75rem 1rem;
            background: #fff;
            border-bottom: 1px solid #ddd;
            font-size: 0.85rem;
        }
        .legend-item { display: flex; align-items: center; gap: 0.5rem; }
        .legend-entity {
            width: 28px; height: 18px;
            background: #7cb342;
            border: 2px solid #558b2f;
        }
        .legend-rel {
            width: 18px; height: 18px;
            background: #42a5f5;
            border: 2px solid #1976d2;
            transform: rotate(45deg);
        }
        .legend-attr {
            width: 36px; height: 20px;
            background: #f48fb1;
            border: 2px solid #c2185b;
            border-radius: 50%;
        }
        .legend-pk {
            width: 36px; height: 20px;
            background: #f48fb1;
            border: 3px solid #b71c1c;
            border-radius: 50%;
            text-decoration: underline;
            font-size: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .canvas-wrap {
            overflow: auto;
            padding: 1rem;
            background: #fafafa;
        }
        svg {
            display: block;
            margin: 0 auto;
            background: #fff;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .entity-box {
            fill: #aed581;
            stroke: #558b2f;
            stroke-width: 2;
        }
        .entity-label {
            fill: #1b5e20;
            font-weight: 700;
            font-size: 13px;
            text-anchor: middle;
        }
        .attr-ellipse {
            fill: #f8bbd0;
            stroke: #c2185b;
            stroke-width: 1.5;
        }
        .attr-ellipse.pk {
            stroke: #b71c1c;
            stroke-width: 2.5;
        }
        .attr-text {
            fill: #333;
            font-size: 11px;
            text-anchor: middle;
            dominant-baseline: middle;
        }
        .attr-text.pk { text-decoration: underline; font-weight: 600; }
        .rel-diamond {
            fill: #64b5f6;
            stroke: #1565c0;
            stroke-width: 2;
        }
        .rel-label {
            fill: #0d47a1;
            font-size: 11px;
            font-weight: 600;
            text-anchor: middle;
            dominant-baseline: middle;
        }
        .card-label {
            fill: #333;
            font-size: 12px;
            font-weight: 700;
        }
        .link-line {
            stroke: #555;
            stroke-width: 1.5;
            fill: none;
        }
        .attr-link { stroke: #888; stroke-width: 1; fill: none; }
        footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.8rem;
            color: #666;
        }
        @media print {
            header, .legend, footer { display: none; }
            .canvas-wrap { overflow: visible; padding: 0; }
            svg { box-shadow: none; }
        }
    </style>
</head>
